upstream euphonia_backend {
    server 127.0.0.1:60001;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name suvani.xyz www.suvani.xyz;
    # Strict SNI match
    ssl_certificate     /etc/nginx/ssl/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/origin.key;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(self), geolocation=()" always;


    # Drop connection for unmatched requests
    error_page 404 = @drop;
    location @drop { return 444; }

    root /home/jovyan/voice_assist/prod/web/xyz;
    index index.html index.htm;

    location / {
        try_files $uri $uri/ =404;
    }

    # Upload endpoints — disable request buffering for lower latency (~50-80ms reduction)
    location ~ ^/(process_audio|transcribe|train_audio|gendia) {
        proxy_request_buffering off;
        proxy_intercept_errors on;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 60s;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_pass http://euphonia_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Other API endpoints
    location ~ ^/(get_voice_models|web/|auth|get_sample_list|login|logout|me|user) {
        proxy_intercept_errors on;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 60s;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        rewrite ^/login$ /auth/login last;
        rewrite ^/logout$ /auth/logout last;
        rewrite ^/me$ /user/current last;
        proxy_pass http://euphonia_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /app {
        alias /home/jovyan/voice_assist/prod/app/xyz;
        index index.html;
        try_files $uri $uri/ /index.html;
        # This allows users to get app updates immediately
        location = /app/flutter_service_worker.js {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            expires off;
        }
        # Cache static assets for 2 hours
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
            expires 2h;
            add_header Cache-Control "public";
        }
    }

    location /app/auth {
        alias /home/jovyan/voice_assist/prod/app/xyz;
        try_files /index.html =404;  # 404 → @drop (connection close)
    }

    # redirects /beta_app (and any sub-paths) to /beta-app
    location ^~ /beta_app {
        return 301 /beta-app$request_uri;
    }
 
    location /beta-app {
        alias /home/jovyan/voice_assist/beta/app/xyz;
        index index.html;
        try_files $uri $uri/ /index.html;
        # This allows users to get app updates immediately
        location = /beta-app/flutter_service_worker.js {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            expires off;
        }
    }

    location /beta-app/auth {
        alias /home/jovyan/voice_assist/beta/app/xyz;
        try_files /index.html =404;  # 404 → @drop (connection close)
    }

    # redirects /test_app (and any sub-paths) to /test-app
    location ^~ /test_app {
        return 301 /test-app$request_uri;
    }
 
    location /test-app {
        alias /home/jovyan/voice_assist/test/app/xyz;
        index index.html;
        try_files $uri $uri/ /index.html;
        # This allows users to get app updates immediately
        location = /test-app/flutter_service_worker.js {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            expires off;
        }
    }

    location /test-app/auth {
        alias /home/jovyan/voice_assist/test/app/xyz;
        try_files /index.html =404;
    }
}
server {
    listen 80;
    server_name www-origin.suvani.xyz;
    return 301 https://www.suvani.xyz;
}
