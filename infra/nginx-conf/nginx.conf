## Comment that out as s6 is running nginx as www-data. 
worker_processes auto;
pid /var/run/nginx/nginx.pid;
# Restrictive global settings
worker_rlimit_nofile 32768;
include /etc/nginx/modules-enabled/*.conf;

events {
	worker_connections 4096;
	multi_accept on;
}

http {

	##
	# Basic Settings
	##

	sendfile on;
	tcp_nopush on;
	tcp_nodelay on;
	types_hash_max_size 2048;
	server_tokens off;

	# server_names_hash_bucket_size 64;
	# server_name_in_redirect off;
	keepalive_timeout 15;
	client_max_body_size 5M;
	include /etc/nginx/mime.types;
	default_type application/octet-stream;
	client_body_temp_path /run/nginx/client_body_temp;
	proxy_temp_path /run/nginx/proxy_temp;
	fastcgi_temp_path /run/nginx/fastcgi_temp;
	uwsgi_temp_path /run/nginx/uwsgi_temp;


	##
	# SSL Settings
	##

	ssl_protocols TLSv1.2 TLSv1.3;
	ssl_prefer_server_ciphers on;
	ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
	ssl_ecdh_curve X25519:secp384r1;

	##
	# Cloudflare Real IP Restoration
	##

	set_real_ip_from 173.245.48.0/20;
	set_real_ip_from 103.21.244.0/22;
	set_real_ip_from 103.22.200.0/22;
	set_real_ip_from 103.31.4.0/22;
	set_real_ip_from 141.101.64.0/18;
	set_real_ip_from 108.162.192.0/18;
	set_real_ip_from 190.93.240.0/20;
	set_real_ip_from 188.114.96.0/20;
	set_real_ip_from 197.234.240.0/22;
	set_real_ip_from 198.41.128.0/17;
	set_real_ip_from 162.158.0.0/15;
	set_real_ip_from 104.16.0.0/13;
	set_real_ip_from 104.24.0.0/14;
	set_real_ip_from 172.64.0.0/13;
	set_real_ip_from 131.0.72.0/22;
	real_ip_header CF-Connecting-IP;

	##
	# Logging Settings
	##

	# Custom log format with timing information
	# $request_time: Total time spent processing request (nginx + upstream)
	# $upstream_response_time: Time spent waiting for upstream server (Python)
	# $upstream_connect_time: Time spent establishing connection to upstream
	# $upstream_header_time: Time spent receiving response header from upstream
	log_format detailed_timing '$remote_addr - $remote_user [$time_local] '
	                           '"$request" $status $body_bytes_sent '
	                           '"$http_referer" "$http_user_agent" '
	                           'rt=$request_time uct=$upstream_connect_time '
	                           'uht=$upstream_header_time urt=$upstream_response_time';

	access_log /var/log/nginx/access.log detailed_timing;
	error_log /var/log/nginx/error.log;

	##
	# Gzip Settings
	##

	gzip on;
	gzip_vary on;
	gzip_proxied any;
	gzip_comp_level 4;
	gzip_min_length 256;
	gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

	##
	# Virtual Host Configs
	##

	include /etc/nginx/conf.d/*.conf;
	include /etc/nginx/sites-enabled/*;
}


